<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealerships - Best Cars</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        nav { background: #1a1a2e; color: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav .brand { font-size: 22px; font-weight: bold; color: #e94560; }
        nav a { color: #fff; text-decoration: none; margin-left: 15px; }
        nav button { background: #e94560; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        h1 { color: #1a1a2e; }
        .filter-bar { margin-bottom: 20px; }
        select { padding: 8px 12px; border-radius: 5px; border: 1px solid #ddd; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background: #1a1a2e; color: #fff; padding: 12px 15px; text-align: left; }
        td { padding: 10px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .review-btn { background: #e94560; color: #fff; padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; }
        .user-bar { text-align: right; margin-bottom: 10px; color: #555; }
        footer { text-align: center; padding: 20px; color: #888; margin-top: 40px; }
        .login-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .login-box { background:#fff; padding:30px; border-radius:10px; width:300px; }
        .login-box h3 { margin-bottom:15px; color:#1a1a2e; }
        .login-box input { width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box; }
        .login-box button { width:100%; padding:10px; background:#e94560; color:#fff; border:none; border-radius:5px; cursor:pointer; }
        .login-box .close-btn { background:#aaa; margin-top:8px; }
        #login-msg { color:red; font-size:13px; margin-bottom:8px; }
    </style>
</head>
<body>
    <nav>
        <div class="brand">Best Cars</div>
        <div>
            <a href="/djangoapp/">Home</a>
            <span id="user-nav">
                <button onclick="document.getElementById('login-modal').style.display='flex'">Login</button>
            </span>
        </div>
    </nav>

    <!-- Login Modal -->
    <div id="login-modal" class="login-modal">
        <div class="login-box">
            <h3>Login</h3>
            <p id="login-msg"></p>
            <input type="text" id="login-user" placeholder="Username" value="testuser">
            <input type="password" id="login-pass" placeholder="Password" value="testpass123">
            <button onclick="doLogin()">Login</button>
            <button class="close-btn" onclick="document.getElementById('login-modal').style.display='none'">Cancel</button>
        </div>
    </div>

    <div class="container">
        <h1>Dealerships</h1>
        <div class="user-bar" id="user-bar"></div>

        <div class="filter-bar">
            <label><strong>Filter by State: </strong></label>
            <select id="state-select" onchange="filterByState(this.value)">
                <option value="All">All States</option>
            </select>
        </div>

        <table id="dealer-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Dealer Name</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Zip</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="dealer-body"></tbody>
        </table>
    </div>

    <footer><p>&copy; 2026 Best Cars Dealership. All rights reserved.</p></footer>

    <script>
        function updateUserBar() {
            var userName = sessionStorage.getItem('username');
            if (userName) {
                document.getElementById('user-nav').innerHTML = '<span style="color:#e94560;margin-left:10px">Welcome, <strong>' + userName + '</strong></span><button onclick="doLogout()" style="margin-left:10px;background:#555;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer">Logout</button>';
                document.getElementById('user-bar').innerHTML = 'Logged in as: <strong>' + userName + '</strong>';
            } else {
                document.getElementById('user-nav').innerHTML = '<button onclick="document.getElementById(\'login-modal\').style.display=\'flex\'" style="background:#e94560;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;margin-left:10px">Login</button>';
                document.getElementById('user-bar').innerHTML = '';
            }
        }

        async function doLogin() {
            var user = document.getElementById('login-user').value;
            var pass = document.getElementById('login-pass').value;
            var res = await fetch('/djangoapp/login/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userName: user, password: pass})
            });
            var data = await res.json();
            if (data.status === 'Authenticated') {
                sessionStorage.setItem('username', data.userName);
                document.getElementById('login-modal').style.display = 'none';
                updateUserBar();
                renderDealers(currentDealers);
            } else {
                document.getElementById('login-msg').textContent = 'Login failed. Try testuser / testpass123';
            }
        }

        async function doLogout() {
            await fetch('/djangoapp/logout/');
            sessionStorage.removeItem('username');
            updateUserBar();
            renderDealers(currentDealers);
        }

        var currentDealers = [];

        async function loadDealers(state) {
            var url = '/djangoapp/get_dealers/';
            if (state && state !== 'All') url = '/djangoapp/get_dealers/' + state + '/';
            var res = await fetch(url);
            var data = await res.json();
            return data.dealers || [];
        }

        function renderDealers(dealers) {
            currentDealers = dealers;
            var userName = sessionStorage.getItem('username');
            var tbody = document.getElementById('dealer-body');
            tbody.innerHTML = '';
            dealers.forEach(function(d) {
                var action = userName
                    ? '<a class="review-btn" href="/djangoapp/reviews/dealer/' + d.id + '/">Review Dealer</a>'
                    : '<span style="color:#aaa;font-size:13px">Login to Review</span>';
                tbody.innerHTML += '<tr><td>' + d.id + '</td><td>' + d.full_name + '</td><td>' + d.city + '</td><td>' + d.state + '</td><td>' + d.zip + '</td><td>' + action + '</td></tr>';
            });
        }

        function populateStates(dealers) {
            var states = [];
            dealers.forEach(function(d) { if (states.indexOf(d.state) === -1) states.push(d.state); });
            states.sort();
            var sel = document.getElementById('state-select');
            states.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s; opt.textContent = s;
                sel.appendChild(opt);
            });
        }

        async function filterByState(state) {
            var dealers = await loadDealers(state);
            renderDealers(dealers);
        }

        updateUserBar();
        loadDealers('All').then(function(dealers) {
            populateStates(dealers);
            renderDealers(dealers);
        });
    </script>
</body>
</html>
